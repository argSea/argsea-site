<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
@keyframes catTailSway{0%,100%{transform:rotate(0deg)}50%{transform:rotate(-11deg)}}
@keyframes catTailDrape{0%,100%{transform:rotate(0deg)}50%{transform:rotate(7deg)}}
@keyframes catBubbleIn{from{opacity:0;transform:translateY(6px) scale(.92)}to{opacity:1;transform:none}}
@keyframes catBlink{0%,90%,100%{transform:scaleY(1)}95%{transform:scaleY(.12)}}
@keyframes catSettle{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){*{animation:none !important}}
</style>
</helmet>

<div style="position:relative;width:100%;height:100%;display:flex;justify-content:center;align-items:flex-end;animation:catSettle .4s ease both;filter:drop-shadow(0 6px 10px rgba(0,0,0,.45))">
  <sc-if value="{{ say }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;left:calc(100% + 8px);top:14px;white-space:nowrap;background:#1c2036;border:1px solid rgba(150,160,220,.4);border-radius:11px 11px 11px 2px;padding:6px 12px;font-family:'IBM Plex Mono',monospace;font-size:11.5px;color:#c3cbf2;box-shadow:0 8px 20px rgba(0,0,0,.45);animation:catBubbleIn .2s ease both;z-index:4">{{ say }}</div>
  </sc-if>

  <!-- ============ PERCHED — front paws on an edge, tail draped (cards, tags, chips, overlay tops, contact, hero, list rows) ============ -->
  <sc-if value="{{ pose === 'perched' }}" hint-placeholder-val="{{ true }}">
  <svg onClick="{{ poke }}" width="100%" height="100%" viewBox="0 0 64 74" fill="none" style="overflow:visible;cursor:pointer">
    <!-- draped tail, swaying -->
    <path d="M45 55 C57 52 61 62 56 70 C54.5 72.5 51 72.5 50 70 C52.5 64.5 50 60 43 60 Z" fill="#232a4d" stroke="#93a0e8" stroke-width="1.4" stroke-linejoin="round" style="transform-origin:45px 56px;animation:catTailSway 4.5s ease-in-out infinite"></path>
    <!-- front paws resting on the edge -->
    <ellipse cx="26" cy="52.5" rx="4.4" ry="3.2" fill="#232a4d" stroke="#93a0e8" stroke-width="1.3"></ellipse>
    <ellipse cx="37.5" cy="52.5" rx="4.4" ry="3.2" fill="#232a4d" stroke="#93a0e8" stroke-width="1.3"></ellipse>
    <!-- body + head + ears -->
    <path d="M12.95 51.8 C9.25 40.7 13.9 29.6 22.2 25.9 L21.3 15.7 L27.4 21.8 L33.7 21.8 L39.8 15.7 L38.85 25.9 C47.2 29.6 51.8 40.7 48.1 51.8 Z" fill="#232a4d" stroke="#93a0e8" stroke-width="1.6" stroke-linejoin="round"></path>
    <!-- inner ears -->
    <path d="M22.7 18.2 L25.6 21.6 L22.2 21.6 Z" fill="#f0d9a8" opacity=".5"></path>
    <path d="M38.3 18.2 L38.8 21.6 L35.4 21.6 Z" fill="#f0d9a8" opacity=".5"></path>
    <!-- eyes -->
    <g style="transform-origin:30px 31px;animation:catBlink 6s ease-in-out infinite">
      <circle cx="25.9" cy="30.8" r="1.9" fill="#f0d9a8"></circle>
      <circle cx="35.2" cy="30.8" r="1.9" fill="#f0d9a8"></circle>
    </g>
    <!-- nose + mouth -->
    <path d="M29.4 35 L32.2 35 L30.8 36.6 Z" fill="#f0d9a8"></path>
    <path d="M30.8 36.6 v1.4 M30.8 38 q-2 1.4 -3.6 .4 M30.8 38 q2 1.4 3.6 .4" stroke="#5f6ec4" stroke-width="1" fill="none" stroke-linecap="round"></path>
    <!-- whiskers -->
    <path d="M22 33 l-7 -1.4 M22 35.4 l-7 1 M39.5 33 l7 -1.4 M39.5 35.4 l7 1" stroke="#5f6ec4" stroke-width="0.9" stroke-linecap="round" opacity=".7"></path>
  </svg>
  </sc-if>

  <!-- ============ LYING — draped along a horizontal element (the current page's nav link) ============ -->
  <sc-if value="{{ pose === 'lying' }}" hint-placeholder-val="{{ false }}">
  <svg onClick="{{ poke }}" width="100%" height="100%" viewBox="0 0 96 48" fill="none" style="overflow:visible;cursor:pointer">
    <!-- tail draping off the rump, gentle drape sway -->
    <path d="M74 36 C86 30 92 39 86 45 C83.5 47.5 80 47 80.5 43.5 C83 39 79 37 73 40 Z" fill="#232a4d" stroke="#93a0e8" stroke-width="1.4" stroke-linejoin="round" style="transform-origin:75px 38px;animation:catTailDrape 5s ease-in-out infinite"></path>
    <!-- front paws forward -->
    <ellipse cx="18" cy="41" rx="4" ry="2.8" fill="#232a4d" stroke="#93a0e8" stroke-width="1.3"></ellipse>
    <ellipse cx="26" cy="41" rx="4" ry="2.8" fill="#232a4d" stroke="#93a0e8" stroke-width="1.3"></ellipse>
    <!-- body loaf + head + ears -->
    <path d="M12 41 C6 34 7 24 15 20 L14.5 17 L14 7 L20 14 L25 14 L30 7 L31 18 C40 21 44 18 54 19 C70 20 79 25 80 33 C81 39 77 41 71 41 Z" fill="#232a4d" stroke="#93a0e8" stroke-width="1.6" stroke-linejoin="round"></path>
    <!-- inner ears -->
    <path d="M15 15 L15 9 L19 13 Z" fill="#f0d9a8" opacity=".5"></path>
    <path d="M29 15 L29.5 9 L25.5 13 Z" fill="#f0d9a8" opacity=".5"></path>
    <!-- eyes -->
    <g style="transform-origin:22px 25px;animation:catBlink 6s ease-in-out infinite">
      <circle cx="18.5" cy="25" r="1.9" fill="#f0d9a8"></circle>
      <circle cx="26" cy="25" r="1.9" fill="#f0d9a8"></circle>
    </g>
    <!-- nose + mouth -->
    <path d="M20.8 28.6 L23.6 28.6 L22.2 30.2 Z" fill="#f0d9a8"></path>
    <path d="M22.2 30.2 v1.4 M22.2 31.6 q-2 1.4 -3.6 .4 M22.2 31.6 q2 1.4 3.6 .4" stroke="#5f6ec4" stroke-width="1" fill="none" stroke-linecap="round"></path>
    <!-- whiskers -->
    <path d="M14 27 l-7 -1.2 M14 29 l-7 .8 M30 27 l7 -1.2 M30 29 l7 .8" stroke="#5f6ec4" stroke-width="0.9" stroke-linecap="round" opacity=".7"></path>
  </svg>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:120,&quot;height&quot;:120},&quot;pose&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;perched&quot;,&quot;lying&quot;],&quot;default&quot;:&quot;perched&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;context&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;postcard&quot;,&quot;note&quot;,&quot;wreck&quot;,&quot;header&quot;,&quot;hero&quot;,&quot;manifest&quot;,&quot;graveyard&quot;,&quot;contact&quot;,&quot;card&quot;,&quot;tag&quot;,&quot;row&quot;,&quot;next&quot;],&quot;default&quot;:&quot;perched&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = { say: null };

  // One quip set per context; a spot passes its context so the cat's line fits
  // where it's sitting. Unknown contexts fall back to the roaming set.
  sets = {
    postcard: ['mrrp.', 'i sat on this one first.', 'read it to me.', 'this postcard is mine now.', 'i approve. mostly.', 'the stamp tastes fine.', 'you opened it, i inspected it.'],
    note: ['mrrp.', 'i walked across the keyboard during this one.', 'typo on line two. i left it.', 'read it to me.', 'i supervised this draft.', 'nap first. then read.', 'i have read it. no comment.'],
    wreck: ['told you to turn left.', 'i would not have hit that.', 'a cat never runs aground.', 'nice parking, captain.', 'i saw the rocks. did you?', 'this is why i steer.', 'should have asked the cat.'],
    header: ['mrrp.', 'this is my page now.', 'you may look. briefly.', 'i live up here.', 'the lighthouse sent me.', 'mind the tail.'],
    hero: ['mrrp.', 'yes, that is the guy.', 'he does keep the lights on. i supervise.', 'hire him. i vouch. mostly.', 'the boxes-and-arrows are mine.'],
    manifest: ['mrrp.', 'you forgot to list me.', 'i am also a tool. currently aboard.', 'inventory looks fine. i counted.', 'the queue is mine now.'],
    graveyard: ['mrrp.', 'good hobbies. all dead.', 'the graveyard is warm. i checked.', 'nothing here is resting harder than me.', 'i outlasted the piano.'],
    contact: ['mrrp.', 'say hi. or do not. i will know.', 'he answers email. i answer to no one.', 'the light is on.'],
    card: ['mrrp.', 'i sat on this one first.', 'this one shipped. i was there.', 'good project. mine now.', 'i approve. mostly.'],
    tag: ['mrrp.', 'good filter. i agree.', 'this is the tag that survives.', 'sorted. by me.', 'tinkering is a lifestyle.'],
    row: ['mrrp.', 'read it to me.', 'i supervised this one.', 'typo on line two. i left it.', 'nap first. then read.'],
    next: ['mrrp.', 'do not pick up another one.', 'blacksmithing? absolutely not.', 'the next hobby is napping. trust me.', 'i am the only hobby you need.'],
  };

  poke() {
    clearTimeout(this.t);
    const ctx = this.sets[this.props.context] ? this.props.context : 'header';
    const pool = this.sets[ctx].filter((q) => q !== this.state.say);
    this.setState({ say: pool[Math.floor(Math.random() * pool.length)] });
    this.t = setTimeout(() => this.setState({ say: null }), 2600);
  }

  componentWillUnmount() { clearTimeout(this.t); }

  renderVals() {
    return { pose: this.props.pose || 'perched', say: this.state.say, poke: () => this.poke() };
  }
}
</script>
</body>
</html>
