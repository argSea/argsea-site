<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<style>
html{background:#131628}
body{margin:0;background:linear-gradient(180deg,#11131f 0%,#131628 100%);font-family:monospace}
</style>
</helmet>
<div style="min-height:100vh;color:#dde1f0;display:flex;flex-direction:column;gap:36px;padding:48px">
  <div style="display:flex;gap:40px;flex-wrap:wrap;align-items:flex-end">
    <div style="display:flex;flex-direction:column;align-items:center;gap:14px">
      <div style="position:relative;width:70px;height:80px;background:#1a1e33;border:1px dashed rgba(150,160,220,.3)">
        <dc-import name="HarborCat" pose="perched" context="hero" hint-size="70px,80px" style="position:absolute;inset:0"></dc-import>
      </div>
      <span style="font-size:12px;color:#93a0e8">perched</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:14px">
      <div style="position:relative;width:130px;height:56px;background:#1a1e33;border:1px dashed rgba(150,160,220,.3)">
        <dc-import name="HarborCat" pose="lying" context="header" hint-size="130px,56px" style="position:absolute;inset:0"></dc-import>
      </div>
      <span style="font-size:12px;color:#93a0e8">lying</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:14px">
      <div style="position:relative;width:80px;height:70px;background:#1a1e33;border:1px dashed rgba(150,160,220,.3)">
        <dc-import name="HarborCat" pose="curled" context="entry" hint-size="80px,70px" style="position:absolute;inset:0"></dc-import>
      </div>
      <span style="font-size:12px;color:#93a0e8">curled</span>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:14px">
      <div style="position:relative;width:80px;height:70px;background:#1a1e33;border:1px dashed rgba(150,160,220,.3)">
        <dc-import name="HarborCat" pose="curled" context="entry" flip="true" hint-size="80px,70px" style="position:absolute;inset:0"></dc-import>
      </div>
      <span style="font-size:12px;color:#93a0e8">curled (flipped)</span>
    </div>
  </div>
  <div style="font-size:13px;color:#5f6ec4">click any cat to poke it</div>
</div>
</x-dc>
</body>
</html>
